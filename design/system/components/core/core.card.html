<!-- @dsCard group="Components" viewport="700x520" name="Core" subtitle="Button, IconButton, Input, Select, Checkbox, Radio, Switch, Tabs, Tooltip" -->
<html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;background:var(--surface-app);}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Input, Select, Checkbox, Radio, Switch, Tabs, Tooltip } = window.AtlasDesignSystem_b2128a;

function Row({children}) { return <div style={{display:"flex",gap:12,alignItems:"center",padding:"12px 16px",borderBottom:"1px solid var(--border-subtle)"}}>{children}</div>; }

function Demo() {
  const [chk, setChk] = React.useState(true);
  const [sw, setSw] = React.useState(true);
  const [tab, setTab] = React.useState("props");
  const [rad, setRad] = React.useState("a");
  const [val, setVal] = React.useState("Ironclad HC");
  return (
    <div>
      <Row>
        <Button variant="primary">Sign Player</Button>
        <Button variant="secondary">Cancel</Button>
        <Button variant="ghost">Ghost</Button>
        <Button variant="danger" size="sm">Delete</Button>
        <Button variant="primary" disabled>Disabled</Button>
      </Row>
      <Row>
        <IconButton title="Pen" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>} active />
        <IconButton title="Eraser" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="13" width="8" height="8"/><path d="M14 3l7 7-9 9-7-7z"/></svg>} />
        <IconButton title="Disabled" icon={<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="9"/></svg>} disabled />
      </Row>
      <Row>
        <Input value={val} onChange={e=>setVal(e.target.value)} placeholder="Team name" style={{width:200}} />
        <Select value="forward" onChange={()=>{}} options={[{value:"forward",label:"Forward"},{value:"defense",label:"Defense"}]} />
      </Row>
      <Row>
        <Checkbox checked={chk} onChange={setChk} label="Show injuries" />
        <Radio checked={rad==='a'} onChange={()=>setRad('a')} label="Regular Season" />
        <Radio checked={rad==='b'} onChange={()=>setRad('b')} label="Playoffs" />
        <Switch checked={sw} onChange={setSw} />
      </Row>
      <Row>
        <Tabs items={[{value:"props",label:"Overview"},{value:"layers",label:"Stats"},{value:"history",label:"History"}]} value={tab} onChange={setTab} />
      </Row>
      <Row>
        <Tooltip label="Right-click to cancel"><Button variant="secondary" size="sm">Hover me</Button></Tooltip>
      </Row>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body></html>
