<!-- @dsCard group="Foundations" viewport="700x180" name="Borders & Surfaces" subtitle="hairline borders on everything; selection = gold border" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;background:var(--surface-canvas);padding:24px;box-sizing:border-box;display:flex;gap:16px;}
  .box{width:140px;height:110px;border-radius:var(--radius-md);display:flex;align-items:flex-end;padding:10px;box-sizing:border-box;font:var(--text-label);color:var(--text-tertiary);}
</style></head>
<body>
  <div class="box" style="background:var(--surface-panel);border:1px solid var(--border-subtle)">border-subtle</div>
  <div class="box" style="background:var(--surface-panel);border:1px solid var(--border-default)">border-default</div>
  <div class="box" style="background:var(--surface-panel);border:1px solid var(--border-selected)">border-selected</div>
  <div class="box" style="background:var(--surface-panel-raised);border:1px solid var(--border-default)">panel-raised</div>
</body></html>
