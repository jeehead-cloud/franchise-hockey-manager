<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;background:var(--surface-app);padding:20px;box-sizing:border-box;display:flex;gap:16px;align-items:center;height:150px;}
  .box{width:90px;height:70px;background:var(--surface-panel-raised);border:1px solid var(--border-default);display:flex;align-items:center;justify-content:center;font:var(--text-data-sm);color:var(--text-tertiary);}
</style></head>
<body>
  <div class="box" style="border-radius:var(--radius-sm)">sm</div>
  <div class="box" style="border-radius:var(--radius-md)">md</div>
  <div class="box" style="border-radius:var(--radius-pill)">pill</div>
  <div class="box" style="border-radius:var(--radius-none)">none</div>
</body></html>
