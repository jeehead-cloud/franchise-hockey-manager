<!-- @dsCard group="Colors" viewport="700x170" name="Neutrals" subtitle="Light shell — white cards on a soft gray app background" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;background:var(--surface-app);font-family:var(--font-sans);}
  .row{display:flex;}
  .sw{flex:1;height:100px;display:flex;align-items:flex-end;padding:8px;box-sizing:border-box;border:1px solid var(--gray-3);}
  .sw span{font:var(--text-data-sm);}
  .wrap{padding:12px;}
</style></head>
<body><div class="wrap">
<div class="row">
  <div class="sw" style="background:var(--gray-0)"><span style="color:var(--gray-8)">gray-0</span></div>
  <div class="sw" style="background:var(--gray-1)"><span style="color:var(--gray-8)">gray-1</span></div>
  <div class="sw" style="background:var(--gray-2)"><span style="color:var(--gray-8)">gray-2</span></div>
  <div class="sw" style="background:var(--gray-3)"><span style="color:var(--gray-8)">gray-3</span></div>
  <div class="sw" style="background:var(--gray-4)"><span style="color:var(--gray-8)">gray-4</span></div>
  <div class="sw" style="background:var(--gray-5)"><span style="color:var(--gray-9)">gray-5</span></div>
  <div class="sw" style="background:var(--gray-6)"><span style="color:var(--gray-0)">gray-6</span></div>
  <div class="sw" style="background:var(--gray-7)"><span style="color:var(--gray-0)">gray-7</span></div>
  <div class="sw" style="background:var(--gray-8)"><span style="color:var(--gray-0)">gray-8</span></div>
  <div class="sw" style="background:var(--gray-9)"><span style="color:var(--gray-0)">gray-9</span></div>
</div>
</div></body></html>
