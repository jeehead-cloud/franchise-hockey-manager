<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px-derived rhythm, space-1 → space-12" -->
<html><head><link rel="stylesheet" href="../styles.css"><style>
  body{margin:0;background:var(--surface-app);padding:20px;box-sizing:border-box;display:flex;align-items:flex-end;gap:6px;height:180px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{width:24px;background:var(--accent-primary);border-radius:2px 2px 0 0;}
  .lbl{font:var(--text-data-sm);color:var(--text-tertiary);}
</style></head>
<body>
  <div class="col"><div class="bar" style="height:var(--space-2)"></div><div class="lbl">2</div></div>
  <div class="col"><div class="bar" style="height:var(--space-3)"></div><div class="lbl">3</div></div>
  <div class="col"><div class="bar" style="height:var(--space-4)"></div><div class="lbl">4</div></div>
  <div class="col"><div class="bar" style="height:var(--space-5)"></div><div class="lbl">5</div></div>
  <div class="col"><div class="bar" style="height:var(--space-6)"></div><div class="lbl">6</div></div>
  <div class="col"><div class="bar" style="height:var(--space-7)"></div><div class="lbl">7</div></div>
  <div class="col"><div class="bar" style="height:var(--space-8)"></div><div class="lbl">8</div></div>
  <div class="col"><div class="bar" style="height:var(--space-9)"></div><div class="lbl">9</div></div>
  <div class="col"><div class="bar" style="height:var(--space-10)"></div><div class="lbl">10</div></div>
  <div class="col"><div class="bar" style="height:var(--space-11)"></div><div class="lbl">11</div></div>
  <div class="col"><div class="bar" style="height:var(--space-12)"></div><div class="lbl">12</div></div>
</body></html>
